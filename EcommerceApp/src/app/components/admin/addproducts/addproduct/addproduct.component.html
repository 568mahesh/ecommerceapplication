<div class="add-product-container">
  <div class="card add-product-card shadow">
    <div class="card-header text-center">
      <h3>Add New Product</h3>
    </div>

    <div class="card-body">
      <form (ngSubmit)="submit()" #productForm="ngForm">

        <div class="form-group mb-3">
          <label>Product Name</label>
          <input type="text" [(ngModel)]="product.name" name="name" class="form-control" placeholder="Enter product name" required>
        </div>

        <div class="form-group mb-3">
          <label>Description</label>
          <textarea [(ngModel)]="product.description" name="description" class="form-control" placeholder="Enter product description" rows="3" required></textarea>
        </div>

        <div class="form-group mb-3">
          <label>Price</label>
          <input type="number" [(ngModel)]="product.price" name="price" class="form-control" placeholder="Enter price" required>
        </div>

        <div class="form-group mb-3">
          <label>Category</label>
          <input type="text" [(ngModel)]="product.category" name="category" class="form-control" placeholder="Enter category" required>
        </div>

        <div class="form-group mb-4">
          <label>Image</label>
          <input type="file" (change)="onFileChange($event)" class="form-control" required>
        </div>

        <button class="btn btn-gradient w-100" type="submit">Add Product</button>
      </form>
    </div>
  </div>
</div>
